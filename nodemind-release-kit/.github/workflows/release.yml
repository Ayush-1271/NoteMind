name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build source tarball
        run: |
          git archive --format=tar.gz --output nodemind-${GITHUB_REF_NAME}.tar.gz --prefix NodeMind-/ ${GITHUB_SHA}
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nodemind-${{ github.ref_name }}.tar.gz
